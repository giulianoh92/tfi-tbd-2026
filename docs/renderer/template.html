  body.segment-render-mode .landscape-page.render-active p {
    margin: 0 !important;
    padding: 0 !important;

<script>
// ============= Preprocesado de Markdown =============

function preprocessWikilinks(md) {
  // [[file#section|alias]] -> **alias** (no hay otras pages en single-file mode)
  return md.replace(/!?\[\[([^\]|#]+?)(?:#([^\]|]+))?(?:\|([^\]]+))?\]\]/g, (match, file, section, alias) => {
    const isEmbed = match.startsWith('!');
    const display = alias || file.split('/').pop().replace(/\.(md|pdf|ppt|pptx|png|jpg|jpeg|gif|svg)$/i, '');
    if (isEmbed) {
      return `*[Embed: ${display}]*`;
    }
    return `**${display}**`;
  });
}

function protectLatex(md) {
  const blocks = [];
  md = md.replace(/\$\$([\s\S]+?)\$\$/g, (m, p1) => {
    blocks.push({ type: 'display', content: p1 });
    return `@@LATEX${blocks.length - 1}@@`;
  });
  md = md.replace(/\$([^\$\n]+?)\$/g, (m, p1) => {
    blocks.push({ type: 'inline', content: p1 });
    return `@@LATEX${blocks.length - 1}@@`;
  });
  return { md, blocks };
}

function restoreLatex(html, blocks) {
  return html.replace(/@@LATEX(\d+)@@/g, (m, idx) => {
    const block = blocks[+idx];
    if (!block) return m;
    try {
      return katex.renderToString(block.content, {
        displayMode: block.type === 'display',
        throwOnError: false,
        output: 'html'
      });
    } catch (e) {
      return block.type === 'display' ? `$$${block.content}$$` : `$${block.content}$`;
    }
  });
}

marked.setOptions({ breaks: false, gfm: true, headerIds: true });

function fixMermaidBlocks(containerEl) {
  containerEl.querySelectorAll('pre > code.language-mermaid').forEach(code => {
    const pre = code.parentElement;
    const content = code.textContent;
    const newPre = document.createElement('pre');
    newPre.className = 'mermaid';
    newPre.textContent = content;
    pre.replaceWith(newPre);
  });
  containerEl.querySelectorAll('pre.mermaid').forEach(pre => {
    const code = pre.querySelector('code');
    if (code) {
      pre.textContent = code.textContent;
    }
    // DER (erDiagram) → página apaisada propia.
    if (/^\s*erDiagram\b/.test(pre.textContent)) {
      pre.classList.add('landscape-page');
    }
  });
}

function postprocessCallouts(containerEl) {
  const blockquotes = Array.from(containerEl.querySelectorAll('blockquote'));
  blockquotes.forEach(bq => {
    const firstP = bq.querySelector('p');
    if (!firstP) return;
    const text = firstP.textContent;
    const match = text.match(/^\[!(\w+)\][+\-]?\s*(.*?)(?:\n|$)/);
    if (!match) return;

    const type = match[1].toLowerCase();
    const title = match[2].trim();

    const innerHTML = firstP.innerHTML;
    const cleanedHTML = innerHTML.replace(/^\[!\w+\][+\-]?[^\n<]*(\s*<br\s*\/?>\s*)?/, '');

    if (cleanedHTML.trim() === '' || cleanedHTML.trim() === '<br>') {
      firstP.remove();
    } else {
      firstP.innerHTML = cleanedHTML;
    }

    const wrapper = document.createElement('div');
    wrapper.className = `callout callout-${type}`;

    const titleEl = document.createElement('div');
    titleEl.className = 'callout-title';
    titleEl.textContent = title || typeToLabel(type);
    wrapper.appendChild(titleEl);

    while (bq.firstChild) {
      wrapper.appendChild(bq.firstChild);
    }

    bq.replaceWith(wrapper);
  });
}

function typeToLabel(type) {
  const labels = {
    info: 'Información', tip: 'Tip', warning: 'Atención',
    danger: 'Peligro', error: 'Error', important: 'Importante',
    example: 'Ejemplo', question: 'Pregunta', done: 'Listo',
    success: 'Listo', note: 'Nota', summary: 'Resumen',
    abstract: 'Abstract', cite: 'Cita', quote: 'Cita',
    bug: 'Bug', failure: 'Falla', fail: 'Falla',
    todo: 'Por hacer', hint: 'Tip'
  };
  return labels[type] || type.charAt(0).toUpperCase() + type.slice(1);
}

function postprocessTags(containerEl) {
  const walker = document.createTreeWalker(containerEl, NodeFilter.SHOW_TEXT);
  const nodes = [];
  let n;
  while ((n = walker.nextNode())) {
    if (n.parentElement && !['CODE', 'PRE', 'A'].includes(n.parentElement.tagName)) {
      nodes.push(n);
    }
  }
  nodes.forEach(textNode => {
    const text = textNode.textContent;
    if (!/#[a-zA-Z][\w\/-]*/.test(text)) return;
    const parts = text.split(/(#[a-zA-Z][\w\/-]*)/);
    if (parts.length === 1) return;
    const frag = document.createDocumentFragment();
    parts.forEach(part => {
      if (/^#[a-zA-Z][\w\/-]*$/.test(part)) {
        const span = document.createElement('span');
        span.className = 'hashtag';
        span.textContent = part;
        frag.appendChild(span);
      } else if (part) {
        frag.appendChild(document.createTextNode(part));
      }
    });
    textNode.replaceWith(frag);
  });
}

function postprocessSubtitle(containerEl) {
  const h1 = containerEl.querySelector('h1');
  if (!h1) return;
  const next = h1.nextElementSibling;
  if (next && next.tagName === 'BLOCKQUOTE' && !next.querySelector('.callout-title')) {
    next.classList.add('subtitle-quote');
  }
}

function hoistAnchorIds(containerEl) {
  // Move id from `<a id="x"></a>` (with no href) onto the next heading.
  // This is required for PDF internal links to work correctly:
  // Chromium generates proper "GoTo" PDF link annotations when the id sits
  // on the heading element itself, not on an adjacent empty anchor.
  const anchors = Array.from(containerEl.querySelectorAll('a[id]:not([href])'));
  anchors.forEach(a => {
    const id = a.id;
    if (!id) return;
    // Marked usually wraps the bare <a> in a <p>. Find the heading that follows.
    let probe = a.parentElement && a.parentElement.tagName === 'P' && a.parentElement.children.length === 1
      ? a.parentElement
      : a;
    let next = probe.nextElementSibling;
    if (next && /^H[1-6]$/.test(next.tagName)) {
      if (!next.id) next.id = id;
      probe.remove();
    }
  });
}

function buildToc(containerEl) {
  const toc = document.getElementById('toc');
  if (!toc) return;
  const headings = containerEl.querySelectorAll('h2, h3');
  headings.forEach((h, i) => {
    if (!h.id) h.id = `h-${i}`;
    const li = document.createElement('li');
    const a = document.createElement('a');
    a.href = `#${h.id}`;
    a.textContent = h.textContent;
    a.className = h.tagName === 'H3' ? 'lvl-3' : 'lvl-2';
    li.appendChild(a);
    toc.appendChild(li);
  });
}

// ============= Render =============

function render() {
  const view = document.getElementById('view');
  const script = document.getElementById('md-content');
  let md = script.textContent;

  md = preprocessWikilinks(md);
  const { md: protectedMd, blocks: latexBlocks } = protectLatex(md);

  let html = marked.parse(protectedMd);
  html = restoreLatex(html, latexBlocks);

  view.innerHTML = html;

  fixMermaidBlocks(view);
  postprocessCallouts(view);
  postprocessSubtitle(view);
  postprocessTags(view);
  hoistAnchorIds(view);
  buildToc(view);

  // Mermaid (con flag para PDF)
  window.__renderState = { mermaidDone: false };
  const mermaidPres = view.querySelectorAll('pre.mermaid');
  if (mermaidPres.length > 0) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
    mermaid.run({ querySelector: '#view pre.mermaid' })
      .then(() => { window.__renderState.mermaidDone = true; })
      .catch(e => { console.warn('Mermaid error:', e); window.__renderState.mermaidDone = true; });
  } else {
    window.__renderState.mermaidDone = true;
  }
}

document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
