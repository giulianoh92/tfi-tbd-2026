name: Apply Migrations to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Force IPv4 for Supabase (GitHub runners can't reach IPv6)
        run: |
          DB_HOST=$(echo "$DATABASE_URL" | sed -n 's|.*@\([^:]*\):.*|\1|p')
          DB_IPV4=$(dig +short A "$DB_HOST" | head -1)
          echo "$DB_IPV4 $DB_HOST" | sudo tee -a /etc/hosts
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          for file in $(ls migrations/*.sql | sort); do
            echo "==> Applying $(basename "$file")..."
            psql "$DATABASE_URL" -f "$file" --set ON_ERROR_STOP=1
          done
          echo "==> All migrations applied."
