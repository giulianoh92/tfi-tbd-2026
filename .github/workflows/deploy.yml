name: Deploy Schema to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'schema/**'
      - 'scripts/apply.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validar schema en Postgres efimero
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tbd_tfi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Aplicar schema en Postgres efimero
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/tbd_tfi_test
        run: |
          set -o pipefail
          ./scripts/apply.sh 2>&1 | tee /tmp/apply.log

      - name: Notificar fallo a Discord
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: ./scripts/notify-discord.sh validate /tmp/apply.log

  deploy:
    name: Aplicar schema en Supabase
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy a Supabase
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -o pipefail
          ./scripts/apply.sh 2>&1 | tee /tmp/apply.log

      - name: Notificar fallo a Discord
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: ./scripts/notify-discord.sh deploy /tmp/apply.log
