services:
  db:
    # Sprint 4 (R9): se usa la imagen de Supabase que viene con pg_cron
    # precargado en shared_preload_libraries. La imagen oficial postgres:16
    # tambien lo soporta pero requiere recompilar el entrypoint para activar
    # la extension; supabase/postgres lo deja listo de fabrica y replica el
    # comportamiento del entorno managed de Supabase Cloud.
    #
    # NOTA: la imagen Supabase corre Postgres 15 (no 16). El schema del
    # proyecto es compatible con ambas versiones (no usa features 16-only).
    # Las env vars (POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB) las
    # respeta el mismo entrypoint, asi que el env_file existente sigue
    # funcionando sin cambios.
    #
    # pg_cron por defecto se instala en la database `postgres`. Si en .env
    # POSTGRES_DB != postgres (por ejemplo `tbd_tfi`), el bloque DO de
    # schema/00_extensions.sql captura el error y deja un RAISE NOTICE
    # explicativo. En Supabase managed la extension viene instalada
    # automaticamente en la database del proyecto.
    image: supabase/postgres:15.1.0.147
    container_name: tbd_tfi_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema:/sql/schema:ro
      - ./scripts:/sql/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tbd_tfi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: tbd_tfi_pgweb
    restart: unless-stopped
    ports:
      - "${PGWEB_PORT:-8081}:8081"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-tbd_tfi}?sslmode=disable"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
